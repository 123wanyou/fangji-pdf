<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>方剂学 · PDF 文档库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            padding: 24px 20px;
        }
        .app {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 28px 32px 32px 32px;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 {
            font-weight: 600;
            font-size: 26px;
            color: #0b1b2f;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header h1 small {
            font-weight: 400;
            font-size: 15px;
            color: #5e6f8d;
        }
        .header .sub {
            color: #5e6f8d;
            font-size: 14px;
            margin-top: 6px;
            border-left: 3px solid #2f7bff;
            padding-left: 14px;
            background: #f0f5ff;
            border-radius: 0 8px 8px 0;
            display: inline-block;
            padding: 5px 16px 5px 14px;
        }
        .stats {
            margin-top: 14px;
            font-size: 14px;
            color: #3d4e6b;
            background: #f4f7fd;
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-block;
        }
        .pdf-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .pdf-card {
            background: #fafcff;
            border: 1px solid #e9edf4;
            border-radius: 20px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1 0 180px;
            max-width: 260px;
        }
        .pdf-card:hover {
            background: #eef4fe;
            border-color: #b8cef0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(47,123,255,0.08);
        }
        .pdf-card .pdf-icon {
            font-size: 24px;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .pdf-card .pdf-name {
            font-weight: 500;
            font-size: 14px;
            color: #1f2a44;
        }
        .pdf-card .pdf-badge {
            margin-left: auto;
            font-size: 11px;
            color: #6b7a99;
            background: #eef2f8;
            padding: 2px 10px;
            border-radius: 30px;
            flex-shrink: 0;
        }
        .footer-note {
            margin-top: 28px;
            font-size: 13px;
            color: #7a89aa;
            border-top: 1px solid #eef2f8;
            padding-top: 18px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer-note code {
            background: #edf2fa;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #1f3a6b;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 28px;
            max-width: 920px;
            width: 100%;
            height: 90vh;
            max-height: 820px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: #fafcff;
        }
        .modal-header .modal-title {
            font-weight: 600;
            font-size: 17px;
            color: #0b1b2f;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 80%;
        }
        .modal-header .modal-title .file-name-display {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .modal-header .modal-title span.badge {
            background: #eef4fe;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 400;
            color: #2f5a9c;
            flex-shrink: 0;
        }
        .modal-close {
            background: none;
            border: 0;
            font-size: 28px;
            cursor: pointer;
            color: #6b7a99;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .modal-close:hover {
            background: #f0f2f6;
            color: #1f2a44;
        }
        .modal-body {
            flex: 1;
            background: #f1f4fa;
            padding: 12px;
            overflow: hidden;
        }
        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 16px;
            background: white;
        }
        @media (max-width: 640px) {
            .app { padding: 16px; }
            .pdf-card { flex: 1 0 140px; max-width: 100%; }
            .modal-box { max-height: 95vh; height: 95vh; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>📄 方剂学 · PDF 文档库 <small>· 点击卡片在线预览</small></h1>
        <div class="sub">⚡ 在线预览 · 无需下载，直接查看 PDF</div>
        <div class="stats" id="fileCount">共 0 个文件</div>
    </div>
    <div class="pdf-grid" id="pdfGrid"></div>
    <div class="footer-note">
        <span>📌 点击任一 PDF 卡片，弹窗在线预览</span>
        <span><code>PDF 文件夹</code> 与网页同目录 /pdf/</span>
        <span style="color:#2f7bff;">✅ 直接在线查看，无需下载</span>
    </div>
</div>

<div class="modal-overlay" id="pdfModal">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title">
                📎 <span class="file-name-display" id="modalFileName">文件名称</span>
                <span class="badge">在线预览</span>
            </div>
            <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div class="modal-body">
            <iframe id="modalPdfFrame" src="" title="PDF 在线预览"></iframe>
        </div>
    </div>
</div>

<script>
    (function() {
        const PDF_BASE = 'pdf/';
        const SITE_URL = 'https://123wanyou.github.io/fangji-pdf/';

        const pdfFiles = [
            { name: '辛温解表剂', file: 'xinwen.pdf.pdf' },
            { name: '辛凉解表剂', file: 'xinliang.pdf.pdf' },
            { name: '扶正解表剂', file: 'fuzheng.pdf.pdf' },
            { name: '泻下剂', file: 'xiexia.pdf.pdf' },
            { name: '和解剂', file: 'hejie.pdf.pdf' },
            { name: '清热剂一', file: 'qingre1.pdf.pdf' },
            { name: '清热剂二', file: 'qingre2.pdf.pdf' },
            { name: '祛暑剂', file: 'qushu.pdf.pdf' },
            { name: '温里剂', file: 'wenli.pdf.pdf' },
            { name: '表里双解剂', file: 'biaoli.pdf.pdf' },
            { name: '补益剂一', file: 'buyi1.pdf.pdf' },
            { name: '补益剂二', file: 'buyi2.pdf.pdf' },
            { name: '固涩剂', file: 'guse.pdf.pdf' },
            { name: '安神剂', file: 'anshen.pdf.pdf' },
            { name: '开窍剂', file: 'kaiqiao.pdf.pdf' },
            { name: '理气剂', file: 'liqi.pdf.pdf' },
            { name: '理血剂', file: 'lixue.pdf.pdf' },
            { name: '治风剂', file: 'zhifeng.pdf.pdf' },
            { name: '治燥剂', file: 'zhizao.pdf.pdf' },
            { name: '祛湿剂', file: 'qushi.pdf.pdf' },
            { name: '祛痰剂', file: 'qutan.pdf.pdf' },
            { name: '消食剂', file: 'xiaoshi.pdf.pdf' },
            { name: '驱虫剂涌吐剂', file: 'quchong.pdf.pdf' },
            { name: '治痈疡剂', file: 'zhiyong.pdf.pdf' }
        ];

        const grid = document.getElementById('pdfGrid');
        const count = document.getElementById('fileCount');
        const modal = document.getElementById('pdfModal');
        const frame = document.getElementById('modalPdfFrame');
        const fileName = document.getElementById('modalFileName');
        const closeBtn = document.getElementById('modalCloseBtn');

        function render() {
            grid.innerHTML = '';
            pdfFiles.forEach(item => {
                const card = document.createElement('div');
                card.className = 'pdf-card';
                card.innerHTML = `
                    <span class="pdf-icon">📄</span>
                    <span class="pdf-name">${item.name}</span>
                    <span class="pdf-badge">PDF</span>
                `;
                card.addEventListener('click', () => openModal(item.file, item.name));
                grid.appendChild(card);
            });
            count.textContent = `共 ${pdfFiles.length} 个文件`;
        }

        function openModal(file, name) {
            if (!file) return;
            // 使用 Google PDF Viewer 实现在线预览（无需下载）
            const pdfUrl = SITE_URL + PDF_BASE + encodeURIComponent(file);
            const viewerUrl = 'https://docs.google.com/viewer?url=' + encodeURIComponent(pdfUrl) + '&embedded=true';
            console.log('📄 在线预览:', viewerUrl);
            frame.src = viewerUrl;
            fileName.textContent = name;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
            // 关闭时清空 iframe，避免残留
            setTimeout(() => { frame.src = ''; }, 300);
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        render();
        console.log('✅ 方剂学 PDF 在线预览已启动，共 ' + pdfFiles.length + ' 个文件');
        console.log('📌 点击卡片即可在线查看 PDF，无需下载');
    })();
</script>
</body>
</html>
